name: Quality

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.advisory }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            advisory: false
          - os: ubuntu-latest
            advisory: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Lint
        run: corepack pnpm lint
      - name: Typecheck
        run: corepack pnpm typecheck
      - name: Test
        run: corepack pnpm test
      - name: Build
        run: corepack pnpm build
      - name: Format check
        run: corepack pnpm format:check
